<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Insertsion</title>
</head>
<body>
    <script>
        let data = [12,23,34,5,7,567,6,34,76,85,345];

        let data_count = [];

        for(let i = 0; data[i] !== undefined; i++){
            data_count[i];
            document.write(data_count);
        }

        for(let j = 1; j < 10; j++){
            document.write(`${j} <br>`);
        }
        
    </script>
    
</body>
</html>
