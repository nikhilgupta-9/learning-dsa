<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn Insertsion</title>
    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
      integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <div class="row p-5">
        <form id="formData">
          <div class="form-group">
            <label for="exampleInputEmail1">Insert Number</label>
            <input
              type="text"
              class="form-control"
              id="insertNum"
              aria-describedby="emailHelp"
              placeholder="Insert Number"
            />
          </div>
          <div class="form-group">
            <label for="exampleInputPassword1">Position</label>
            <input
              type="text"
              class="form-control"
              id="position"
              placeholder="Position"
            />
          </div>

          <button type="submit" class="btn btn-primary">Submit</button>
        </form>
      </div>
      <div class="row">
        <div id="alert"></div>
      </div>
      <div class="row">
        <table>
          <tr>
            <td>My array :-</td>
            <td id="myArray"></td>
          </tr>
          <tr>
            <td>Array Size :-</td>
            <td id="arraySize"></td>
          </tr>
          <tr>
            <td>Position Number is :-</td>
            <td id="submitPosition"></td>
          </tr>
        </table>
      </div>
    </div>
    <script>
      let myArray = document.getElementById("myArray");
      let formData = document.getElementById("formData");

      let data = [12, 23, 34, 5, 7, 567, 6, 34, 76, 85, 345];
      myArray.innerText = data;

      let data_count = 0;

      for (let i = 0; data[i] !== undefined; i++) {
        data_count++;
      }
      document.getElementById("arraySize").innerText = data_count;

      formData.addEventListener("submit", function (e) {
        e.preventDefault();

        let position = document.getElementById("position").value;
        let insertNum = document.getElementById("insertNum").value;

        for (let j = data_count; j >= 0; j--) {
          if (j >= position) {
            data[j + 1] = data[j];

            if (j == position) {
              data[j] = insertNum;
            }
          }
        }

        document.getElementById("submitPosition").innerHTML = position;
        let alert = document.getElementById("alert");
        alert.classList.add("alert", "alert-warning");
        alert.innerText = data;

        setTimeout(() => {
          alert.classList.remove("alert", "alert-warning");
        }, 5000);

        let submitPosition = document.getElementById("submitPosition");

        setTimeout(() => {
          submitPosition.classList.add("alert", "alert-info");
        }, 5000);
      });
    </script>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script
      src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
      integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"
      integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"
      integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
