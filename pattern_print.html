    <script>
      let num1 = 5;
      let patternLetter = "*";

      for (let i = 1; i <= num1; i++) {
        // print spaces
        for (let j = 1; j <= num1 - i; j++) {
          document.write("&nbsp;&nbsp;");
        }

        // print stars
        for (let k = 1; k <= 2 * i - 1; k++) {
          document.write(patternLetter);
        }

        document.write("<br>");
      }
    </script>
  </body>
