<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Traversing</title>
</head>
<body>
    <script>
        let data = [12,10,4,5,8,122,32,65,63];

         count_name = 0;

        for(let j = 0; data[j] !== undefined; j++){
            count_name++;
        }
        console.log(count_name);

        for(let i = 0; i < count_name; i++){
        document.write(`${data[i]} <br>`);
        }
       
       
    </script>
</body>
</html>
